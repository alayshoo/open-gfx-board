<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      background: rgba(10, 10, 18, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
      animation: pop-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop-in {
      from { transform: scale(0.85) translateY(16px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }

    /* Gradient top border */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #4f8ef7, #a855f7, #ec4899);
    }

    /* Subtle glow behind the left icon */
    .icon-wrap {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(79, 142, 247, 0.25), rgba(168, 85, 247, 0.25));
      border: 1px solid rgba(79, 142, 247, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-wrap svg {
      width: 22px;
      height: 22px;
      fill: #7bb3fa;
    }

    /* Text content */
    .text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .program {
      font-size: 1.05rem;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    /* Time badge on the right */
    .time-badge {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .time-value {
      font-size: 1.125rem;
      font-weight: 600;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }

    .date-value {
      font-size: 0.6875rem;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Animated scan line */
    .scan {
      position: absolute;
      top: 0; bottom: 0;
      width: 60px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      animation: scan 3s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      from { left: -60px; }
      to   { left: calc(100% + 60px); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="scan"></div>

    <div class="icon-wrap">
      <!-- broadcast / signal icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-5.66 5.66a8 8 0 1 1 11.32 0l-1.42-1.42a6 6 0 1 0-8.48 0L6.34 15.66zM3.51 18.49a12 12 0 1 1 16.97 0l-1.41-1.42a10 10 0 1 0-14.14 0L3.51 18.49z"/>
      </svg>
    </div>

    <div class="text">
      <span class="label">Now on air</span>
      <span class="program">{{var:program_name}}</span>
    </div>

    <div class="time-badge">
      <span class="time-value">{{var:current_time}}</span>
      <span class="date-value">{{var:current_date}}</span>
    </div>
  </div>

</body>
</html>
