<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

  .card-popup {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(0, 0, 0, 0.9);
    border-radius: 10px;
    padding: 16px 28px;
    animation: cardSlide 0.4s ease-out;
  }

  @keyframes cardSlide {
    0% { transform: translateY(-20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .card-icon {
    width: 36px;
    height: 50px;
    border-radius: 4px;
    background: {{plugin:football:context:card_color}};
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .card-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .card-type {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: {{plugin:football:context:card_color}};
  }

  .player-name {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
  }

  .player-number {
    font-size: 28px;
    font-weight: 700;
    color: #a1a1aa;
  }
</style>
</head>
<body>
  <div class="card-popup">
    <div class="card-icon"></div>
    <div class="card-info">
      <span class="card-type">{{plugin:football:context:team_name}}</span>
      <span class="player-name">{{plugin:football:context:player_name}}</span>
    </div>
    <span class="player-number">{{plugin:football:context:player_number}}</span>
  </div>
</body>
</html>
