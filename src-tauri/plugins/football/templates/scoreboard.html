<!DOCTYPE html>
<html>

<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .scoreboard-grid {
      display: grid;
      grid-template-columns: 0 max-content 60px;
      grid-template-rows: 100px 50px;
      position: fixed;
      top: 30px;
      left: 30px;
    }

    .scoreboard-grid.has-logo {
      grid-template-columns: 180px max-content 60px;
    }

    .scoreboard-grid:not(.has-logo) .team-block:first-child {
      border-top-left-radius: 8px;
    }

    .cell {
      background: transparent;
    }

    .logo-cell {
      overflow: hidden;
      background: #f4f4f5;
      border-top-left-radius: 8px;
      border-bottom-left-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
    }

    .flex-col {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .team-block {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }

    .team-block:first-child {
      border-bottom: 1px solid rgba(0, 0, 0, 0.15);
    }

    .score-cell {
      background: rgba(0, 0, 0, 0.88);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
      display: flex;
      flex-direction: column;
    }

    .timer-cell {
      background: rgba(0, 0, 0, 0.88);
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }

    .team-name {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
    }

    .score {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #f0f0f0;
    }

    .score:first-child {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .timer {
      font-size: 28px;
      font-weight: 600;
      color: #a1a1aa;
      letter-spacing: 0.12em;
    }

    #logo-img {
      max-width: 78%;
      max-height: 78%;
      object-fit: contain;
    }

    .color-bar {
      width: 8px;
      height: 24px;
      border-radius: 4px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div class="scoreboard-grid">
    <div class="logo-cell">
      <img id="logo-img" alt="" />
    </div>
    <div class="cell">
      <div class="flex-col">
        <div class="team-block" style="background:{{plugin:football:home_primary_color}}">
          <div class="color-bar" id="home-color" style="background:{{plugin:football:home_secondary_color}}"></div>
          <span class="team-name" data-plugin-var="home_short_name">{{plugin:football:home_short_name}}</span>
        </div>
        <div class="team-block" style="background:{{plugin:football:away_primary_color}}">
          <div class="color-bar" id="away-color" style="background:{{plugin:football:away_secondary_color}}"></div>
          <span class="team-name" data-plugin-var="away_short_name">{{plugin:football:away_short_name}}</span>
        </div>
      </div>
    </div>
    <div class="score-cell">
      <div class="flex-col">
        <div class="score" data-plugin-var="home_score">{{plugin:football:home_score}}</div>
        <div class="score" data-plugin-var="away_score">{{plugin:football:away_score}}</div>
      </div>
    </div>
    <div class="timer-cell">
      <span class="timer" id="timer">00:00</span>
    </div>
    <div class="cell"></div>
  </div>

  <script>
    (function () {
      let state = {};

      function applyLogo(dataUrl) {
        const grid = document.querySelector('.scoreboard-grid');
        const img = document.getElementById('logo-img');
        if (dataUrl) {
          if (img) img.src = dataUrl;
          grid.classList.add('has-logo');
        } else {
          if (img) img.src = '';
          grid.classList.remove('has-logo');
        }
      }

      function getContrastColor(hex) {
        if (!hex || hex.length < 7) return '#ffffff';
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        // Perceived luminance — matches human eye sensitivity weighting
        const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        return luminance > 0.5 ? '#000000' : '#ffffff';
      }

      function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }

      function getTimerSec() {
        let t = Number(state.timer_accumulated) || 0;
        if (state.timer_running && state.timer_start_epoch) {
          t += Math.floor(Date.now() / 1000) - Number(state.timer_start_epoch);
        }
        return Math.max(0, t);
      }

      function update() {
        const timerEl = document.getElementById('timer');
        if (timerEl) timerEl.textContent = formatTime(getTimerSec());
        requestAnimationFrame(update);
      }

      function applyState(s) {
        state = s;
        const homeColor = document.getElementById('home-color');
        if (homeColor && s.home_secondary_color) homeColor.style.background = s.home_secondary_color;
        const awayColor = document.getElementById('away-color');
        if (awayColor && s.away_secondary_color) awayColor.style.background = s.away_secondary_color;

        applyLogo(s.logo_data_url || '');

        const homeName = document.querySelector('[data-plugin-var="home_short_name"]');
        if (homeName && s.home_primary_color) homeName.style.color = getContrastColor(s.home_primary_color);
        const awayName = document.querySelector('[data-plugin-var="away_short_name"]');
        if (awayName && s.away_primary_color) awayName.style.color = getContrastColor(s.away_primary_color);

        // data-plugin-var auto-updates are handled by the injected SDK
      }

      // Listen for state updates from the injected SDK
      window.addEventListener('plugin-state', function (e) {
        applyState(e.detail);
      });

      // Initial state from SDK
      if (window.__pluginSDK) {
        window.__pluginSDK.getState().then(applyState);
      }

      requestAnimationFrame(update);
    })();
  </script>
</body>

</html>
