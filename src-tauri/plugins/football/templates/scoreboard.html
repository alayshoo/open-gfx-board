<!DOCTYPE html>
<html>

<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .scoreboard {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.88);
      border-radius: 10px;
      padding: 10px 24px;
      gap: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .scoreboard-grid {
      display: grid;
      grid-template-columns: 120px max-content 60px;
      grid-template-rows: 120px 60px;
      position: fixed;
      top: 30px;
      left: 30px;
    }

    .cell {
      background: transparent;
      border: transparent;
    }

    .logo-cell {
      background: #eee;
      border-top-left-radius: 12px;
      border-bottom-left-radius: 12px;
    }

    .flex-col {
      display: inline-flex;
      flex-direction: column;
      height: 100%;
    }

    .team-block {

    }

    .score-cell {
      background:rgba(0, 0, 0, 0.88);
      border: transparent;
      border-top-right-radius: 12px;
      border-bottom-right-radius: 12px;
    }

    .timer-cell {
      background:rgba(0, 0, 0, 0.88);
      border: transparent;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
    }

    .team-name {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.02em;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score {
      font-size: 30px;
      font-weight: 900;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      min-width: 30px;
      text-align: center;
    }

    .timer {
      font-size: 18px;
      font-weight: 600;
      color: #a1a1aa;
      font-variant-numeric: tabular-nums;
    }

    .color-bar {
      width: 4px;
      height: 28px;
      border-radius: 2px;
    }
  </style>
</head>

<body>
  <div class="scoreboard-grid">
    <div class="logo-cell">Logo</div>
    <div class="cell">
      <div class="flex-col">
        <div class="team-block" style="background:{{plugin:football:home_primary_color}}">
          <span class="team-name" data-plugin-var="home_team_name">{{plugin:football:home_team_name}}</span>
          <div class="color-bar" id="home-color" style="background:{{plugin:football:home_secondary_color}}"></div>
        </div>
        <div class="team-block" style="background:{{plugin:football:away_primary_color}}">
          <span class="team-name" data-plugin-var="away_team_name">{{plugin:football:away_team_name}}</span>
          <div class="color-bar" id="away-color" style="background:{{plugin:football:away_secondary_color}}"></div>
        </div>
      </div>
    </div>
    <div class="score-cell">
      <div class="flex-col">
        <div class="score" data-plugin-var="home_score">{{plugin:football:home_score}}</div>
        <div class="score" data-plugin-var="away_score">{{plugin:football:away_score}}</div>
      </div>
    </div>
    <div class="cell"></div>
    <div class="timer-cell">
      <span class="timer" id="timer">00:00</span>
    </div>
    <div class="cell"></div>
  </div>

  <script>
    (function () {
      let state = {};

      function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }

      function getTimerSec() {
        let t = Number(state.timer_accumulated) || 0;
        if (state.timer_running && state.timer_start_epoch) {
          t += Math.floor(Date.now() / 1000) - Number(state.timer_start_epoch);
        }
        return Math.max(0, t);
      }

      function update() {
        const timerEl = document.getElementById('timer');
        if (timerEl) timerEl.textContent = formatTime(getTimerSec());
        requestAnimationFrame(update);
      }

      function applyState(s) {
        state = s;
        const homeColor = document.getElementById('home-color');
        if (homeColor && s.home_primary_color) homeColor.style.background = s.home_primary_color;
        const awayColor = document.getElementById('away-color');
        if (awayColor && s.away_primary_color) awayColor.style.background = s.away_primary_color;

        // data-plugin-var auto-updates are handled by the injected SDK
      }

      // Listen for state updates from the injected SDK
      window.addEventListener('plugin-state', function (e) {
        applyState(e.detail);
      });

      // Initial state from SDK
      if (window.__pluginSDK) {
        window.__pluginSDK.getState().then(applyState);
      }

      requestAnimationFrame(update);
    })();
  </script>
</body>

</html>
