<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

  .goal-popup {
    width: fit-content;
    height: fit-content;
    display: flex;
    align-items: center;
    gap: 18px;
    background: rgba(0, 0, 0, 0.9);
    border-radius: 11px;
    padding: 18px 31px;
    animation: cardSlide 0.4s ease-out;
    white-space: nowrap;
  }

  @keyframes cardSlide {
    0% { transform: translateY(-22px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .goal-icon {
    width: 40px;
    height: 55px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  @keyframes ballKick {
    0%   { transform: translate(-30px, 38px) scale(0.28) rotate(0deg);  filter: brightness(0.2); }
    28%  { transform: translate(-18px,  4px) scale(0.58) rotate(11deg); filter: brightness(0.5); }
    55%  { transform: translate(-8px, -14px) scale(0.82) rotate(23deg); filter: brightness(0.8); }
    78%  { transform: translate(-2px,  -3px) scale(0.95) rotate(29deg); filter: brightness(0.95); }
    100% { transform: translate(0, 0)        scale(1)    rotate(32deg); filter: brightness(1); }
  }

  .goal-icon svg {
    animation: ballKick 0.75s ease-out 0.8s both;
  }

  .goal-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .team-name {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #22c55e;
  }

  .player-name {
    font-size: 24px;
    font-weight: 700;
    color: #ffffff;
  }

  .player-number {
    font-size: 31px;
    font-weight: 700;
    color: #a1a1aa;
    line-height: 1;
    padding-left: 18px;
    border-left: 1px solid rgba(255, 255, 255, 0.12);
  }
</style>
</head>
<body>
  <div class="goal-popup">
    <div class="goal-icon">
      <svg xmlns="http://www.w3.org/2000/svg" height="50px" viewBox="0 -960 960 960" width="50px" fill="#eeeeee"><path d="M480-120q-74.54 0-140.23-28.42-65.69-28.43-114.31-77.04-48.61-48.62-77.04-114.31Q120-405.46 120-480q0-74.54 28.42-140.23 28.43-65.69 77.04-114.31 48.62-48.61 114.31-77.04Q405.46-840 480-840q74.54 0 140.23 28.42 65.69 28.43 114.31 77.04 48.61 48.62 77.04 114.31Q840-554.54 840-480q0 74.54-28.42 140.23-28.43 65.69-77.04 114.31-48.62 48.61-114.31 77.04Q554.54-120 480-120Zm186.15-436.92 69.39-22.62 19.08-67.84q-32-51.85-80.85-88.27-48.85-36.43-109-53.43L500-743.38v69.84l166.15 116.62Zm-372.3 0L460-673.54v-69.84l-64.77-45.7q-60.15 17-108.23 53.43-48.08 36.42-80.08 88.27L226-579.54l67.85 22.62Zm-52.77 291.07 62.92-5.53 39.23-64.77-59.54-180.16-71.38-24.61L160-503.23q0 70.38 17.23 126.58 17.23 56.19 63.85 110.8Zm291.46 101.47q26.54-4.39 55.15-13.16l34.16-73.84-35.23-57.85H373.38l-33.69 57.85 34.16 73.84q26.3 8.77 53.23 13.16Q454-160 480-160t52.54-4.38ZM382.31-349.23h196.92l59.08-178.46L480-638.92 322.15-527.69l60.16 178.46Zm336.61 83.38q46.62-54.61 63.85-110.8Q800-432.85 800-503.23l-50.77-35.69-72.92 21.07-59.54 181.7L656-271.38l62.92 5.53Z"/></svg>
    </div>
    <div class="goal-info">
      <span class="team-name">{{plugin:football:context:team_name}}</span>
      <span class="player-name">{{plugin:football:context:player_name}}</span>
    </div>
    <span class="player-number">{{plugin:football:context:player_number}}</span>
  </div>
</body>
</html>
