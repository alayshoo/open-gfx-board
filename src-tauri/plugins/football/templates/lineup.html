<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Lexend', sans-serif;
      /* Float the card at the bottom-center, leaving the rest transparent */
      display: flex;
      align-items: flex-end;
      justify-content: center;
      align-items: end;
      padding-bottom: 52px;
    }

    /* ─── Floating card ─────────────────────────────────────────────── */
    .formation-panel {
      width: 1340px;
      height: 860px;
      display: flex;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }

    /* ─── Left: Info Panel ──────────────────────────────────────────── */
    .formation-info-panel {
      width: 370px;
      height: 100%;
      border-radius: 18px;
      background: rgba(10, 10, 10, 0.90);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.07);
      flex-shrink: 0;
      overflow: hidden;
      z-index: 1;
      transform-origin: bottom right;
      transition: transform 1220ms cubic-bezier(0.22, 1, 0.36, 1),
        opacity 650ms ease-out;
    }

    .formation-team-pill {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 26px;
    }

    .formation-team-name {
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .info-panel-content {
      padding-left: 24px;
      padding-right: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* Manager */
    .manager-name {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.82);
      letter-spacing: 0.02em;
    }

    /* Sections */
    .players-section {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      height: fit-content;
      flex-shrink: 0;
    }

    .subs-section {
      padding-bottom: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }

    .subs-section .players-list {
      flex: 1;
      min-height: 0;
      overflow-y: hidden;
      scrollbar-width: none;
    }

    .subs-section .players-list::-webkit-scrollbar {
      display: none;
    }

    .section-label {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .players-list {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: fit-content;
    }

    /* Roster rows */
    .roster-player {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 3px 0;
    }

    .roster-player-number {
      font-size: 18px;
      font-weight: 800;
      width: 26px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .roster-player-name {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .roster-player.substitute .roster-player-name {
      color: rgba(255, 255, 255, 0.38);
    }

    .roster-player.substitute .roster-player-number {
      opacity: 0.38;
    }

    /* ─── Right: Half-Pitch ─────────────────────────────────────────── */
    .pitch-wrapper {
      flex: 1;
      display: flex;
      align-items: end;
      justify-content: center;
      background: trans;
      position: relative;
      padding-bottom: 18px;
      padding-right: 12px;
      z-index: 2;
      transition: transform 520ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .formation-panel.pre-animation .formation-info-panel {
      transform: translateX(-370px) scaleY(0.88);
      opacity: 0.15;
    }

    .formation-panel.pre-animation .pitch-wrapper {
      transform: translateX(185px);
    }

    /*
     * Half-field: aspect-ratio 68/52 ≈ real half-pitch proportions.
     * Top edge  = centre line  (attackers near top)
     * Bottom edge = goal line  (GK near bottom)
     */
    .pitch-outer {
      height: 88%;
      aspect-ratio: 68 / 52;
      position: relative;
    }

    .pitch-container {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      background-color: #2e7d32;
      background-image: repeating-linear-gradient(to bottom,
          transparent 0px,
          transparent 84px,
          rgba(0, 0, 0, 0.055) 84px,
          rgba(0, 0, 0, 0.055) 168px);
    }

    /*
     * Centre-circle arc — only the half that enters our half of the pitch is visible.
     * The full circle is centered exactly on the top border; overflow:hidden clips the top half.
     */
    .center-arc {
      position: absolute;
      top: 0;
      left: 50%;
      width: 27%;
      /* ≈ centre-circle diameter / pitch-width (18.3 m / 68 m) */
      aspect-ratio: 1;
      border: 6px solid rgba(255, 255, 255);
      border-radius: 50%;
      transform: translateX(-50%) translateY(-50%);
      pointer-events: none;
    }

    /* Our penalty area — bottom of the half-pitch (our goal end) */
    .penalty-area {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 59%;
      height: 32%;
      border: 6px solid rgba(255, 255, 255);
      border-bottom: none;
      box-sizing: border-box;
    }

    .goal-area {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 27%;
      height: 16%;
      border: 6px solid rgba(255, 255, 255);
      border-bottom: none;
      box-sizing: border-box;
    }

    /* ─── Formation layer ───────────────────────────────────────────── */
    .formation-layer {
      position: absolute;
      inset: 0;
    }

    /* GK sits just above the goal line */
    .goalkeeper-position {
      position: absolute;
      bottom: 5%;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Outfield lines — top% set by JS positionMap */
    .line-positions {
      position: absolute;
      left: 0;
      right: 0;
      display: none;
      justify-content: space-evenly;
      align-items: center;
      padding: 0 5%;
    }

    /* ─── Player element ────────────────────────────────────────────── */
    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .jersey-container {
      position: relative;
      width: 110px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .jersey-svg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .jersey-svg svg {
      width: 110px;
      height: 110px;
      filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.60));
    }

    .formation-player-number {
      position: relative;
      z-index: 1;
      font-size: 46px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-top: 7px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.40);
    }

    .formation-player-name {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.95), 0 0 8px rgba(0, 0, 0, 0.7);
      text-align: center;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>

<body>
  <div class="formation-panel pre-animation" id="formation-panel">

    <!-- Half-Pitch -->
    <div class="pitch-wrapper">
      <div class="pitch-outer">
        <div class="pitch-container">

          <!-- Centre-circle arc (bottom half of the centre circle, visible from top edge) -->
          <div class="center-arc"></div>

          <!-- Our goal end markings at the bottom -->
          <div class="penalty-area"></div>
          <div class="goal-area"></div>

          <div class="formation-layer" id="formation-layer">
            <div class="goalkeeper-position" id="formation-gk"></div>
            <div class="line-positions" id="formation-line1"></div>
            <div class="line-positions" id="formation-line2"></div>
            <div class="line-positions" id="formation-line3"></div>
            <div class="line-positions" id="formation-line4"></div>
          </div>

        </div>
      </div>
    </div>

    <!-- Info Panel -->
    <div class="formation-info-panel">
      <div class="formation-team-pill" id="formation-team-pill">
        <div class="formation-team-name" id="formation-team-name">TEAM NAME</div>
      </div>

      <div class="info-panel-content">
        <div class="manager-section">
          <div class="section-label">Treinador</div>
          <div class="manager-name" id="formation-manager">—</div>
        </div>

        <div class="players-section">
          <div class="section-label">Titulares</div>
          <div class="players-list" id="formation-starting"></div>
        </div>

        <div class="subs-section">
          <div class="section-label">Suplentes</div>
          <div class="players-list" id="formation-subs"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    (function () {

      function createPlayerElement(number, name, bgColor, textColor) {
        const lastName = name ? name.split(' ').pop() : '';
        const jerseySvg = `
        <svg xmlns="http://www.w3.org/2000/svg" height="83px" viewBox="0 -960 960 960" width="83px" fill="${bgColor}">
          <path d="m250-569-63 35q-14 8-29.5 4.5T136-546L67-665q-8-14-4.5-24T79-707l228-133h64q11 0 17.5 6.5T395-816v15q0 38 24 62t62 24q38 0 61.5-24t23.5-62v-15q0-11 6.5-17.5T590-840h64l228 133q13 8 16 18t-4 24l-70 119q-6 13-25 17t-30-3l-62-39v412q0 16-12 27.5T667-120H289q-16 0-27.5-11.5T250-159v-410Z"/>
        </svg>`;
        return `
        <div class="player">
          <div class="jersey-container">
            <div class="jersey-svg">${jerseySvg}</div>
            <div class="formation-player-number" style="color:${textColor}">${number}</div>
          </div>
          <div class="formation-player-name">${lastName}</div>
        </div>`;
      }

      function getPlayerName(roster, number) {
        const p = roster.find(r => String(r.number) === String(number));
        return p ? p.name : `Player ${number}`;
      }

      function startSubsAutoScroll(listEl, durationMs = 15000) {
        if (!listEl) return;

        if (listEl.__scrollAnimId) {
          cancelAnimationFrame(listEl.__scrollAnimId);
          listEl.__scrollAnimId = null;
        }

        listEl.scrollTop = 0;
        const maxScroll = Math.max(0, listEl.scrollHeight - listEl.clientHeight);
        if (maxScroll <= 0) return;

        let startTime = null;

        const tick = (timestamp) => {
          if (startTime === null) startTime = timestamp;
          const elapsed = (timestamp - startTime) % durationMs;
          const progress = elapsed / durationMs;
          listEl.scrollTop = maxScroll * progress;
          listEl.__scrollAnimId = requestAnimationFrame(tick);
        };

        listEl.__scrollAnimId = requestAnimationFrame(tick);
      }

      async function load() {
        if (!window.__pluginSDK) return;
        const sdk = window.__pluginSDK;

        try {
          const state = await sdk.getState();
          const team = '{{plugin:football:context:team}}' === 'away' ? 'away' : 'home';
          const teamId = team === 'away' ? state.away_team_id : state.home_team_id;
          if (!teamId) return;

          const bgColor = (team === 'away' ? state.away_primary_color : state.home_primary_color) || '#1d4ed8';
          const textColor = (team === 'away' ? state.away_secondary_color : state.home_secondary_color) || '#ffffff';
          const teamName = (team === 'away' ? state.away_team_name : state.home_team_name) || 'HOME';

          // Apply team pill
          const pill = document.getElementById('formation-team-pill');
          const nameEl = document.getElementById('formation-team-name');
          pill.style.backgroundColor = bgColor;
          nameEl.style.color = textColor;
          nameEl.textContent = teamName;

          // Manager — use state value, fallback to teams table
          let manager = (team === 'away' ? state.away_manager : state.home_manager) || '';
          if (!manager) {
            const teams = await sdk.getData('teams');
            const teamRecord = teams.find(t => t.id === teamId);
            manager = teamRecord?.manager || '';
          }
          document.getElementById('formation-manager').textContent = manager || '—';

          // Players
          const allPlayers = await sdk.getData('players');
          const roster = allPlayers
            .filter(p => p.team_id === teamId)
            .sort((a, b) => a.number - b.number);

          // Formation — convert plugin DB rows → {goalkeeper, lines[]} shape
          const allFormation = await sdk.getData('formation');
          const teamFormation = allFormation.filter(f => f.team_id === teamId);

          const goalkeeper = teamFormation.find(f => f.row_index === 0)?.player_number || null;
          const rawLines = [[], [], [], []];
          for (const f of teamFormation) {
            if (f.row_index >= 1 && f.row_index <= 4)
              rawLines[f.row_index - 1].push({ slot: f.slot_index, num: f.player_number });
          }
          const lines = rawLines.map(line =>
            line.sort((a, b) => a.slot - b.slot).map(l => l.num)
          );

          // Starters vs Subs
          const startingNumbers = new Set();
          if (goalkeeper) startingNumbers.add(String(goalkeeper));
          lines.forEach(line => line.forEach(n => startingNumbers.add(String(n))));

          const starters = roster.filter(p => startingNumbers.has(String(p.number)));
          const subs = roster.filter(p => !startingNumbers.has(String(p.number)));

          // Info panel — starters
          document.getElementById('formation-starting').innerHTML = starters
            .map(p => `
            <div class="roster-player starting">
              <div class="roster-player-number" style="color:${bgColor}">${p.number}</div>
              <div class="roster-player-name">${p.name}</div>
            </div>`)
            .join('');

          // Info panel — subs
          document.getElementById('formation-subs').innerHTML = subs
            .map(p => `
            <div class="roster-player substitute">
              <div class="roster-player-number" style="color:${bgColor}">${p.number}</div>
              <div class="roster-player-name">${p.name}</div>
            </div>`)
            .join('');

          startSubsAutoScroll(document.getElementById('formation-subs'), 15000);

          const formationPanel = document.getElementById('formation-panel');
          if (formationPanel) {
            setTimeout(() => {
              formationPanel.classList.remove('pre-animation');
            }, 500);
          }

          // Pitch — reset
          document.getElementById('formation-gk').innerHTML = '';
          for (let i = 1; i <= 4; i++) {
            const el = document.getElementById(`formation-line${i}`);
            el.innerHTML = '';
            el.style.display = 'none';
          }

          // Pitch — goalkeeper
          if (goalkeeper) {
            document.getElementById('formation-gk').innerHTML =
              createPlayerElement(goalkeeper, getPlayerName(roster, goalkeeper), bgColor, textColor);
          }

          // Pitch — outfield lines
          // positionMap: top-% within the half-pitch (0% = centre line, 100% = goal line)
          const activeLines = lines.filter(l => l.length > 0);
          const positionMap = {
            1: ['35%'],
            2: ['50%', '17%'],
            3: ['55%', '31%', '7%'],
            4: ['58%', '40%', '22%', '3%'],
          };
          const positions = positionMap[activeLines.length] || [];

          let activeIdx = 0;
          lines.forEach((line, i) => {
            if (line.length === 0) return;
            const el = document.getElementById(`formation-line${i + 1}`);
            el.style.top = positions[activeIdx] || '50%';
            el.style.display = 'flex';
            el.innerHTML = line
              .map(num => createPlayerElement(num, getPlayerName(roster, num), bgColor, textColor))
              .join('');
            activeIdx++;
          });

        } catch (e) {
          console.error('Lineup load error:', e);
        }
      }

      // Wait for SDK injection
      if (window.__pluginSDK) {
        load();
      } else {
        const check = setInterval(() => {
          if (window.__pluginSDK) { clearInterval(check); load(); }
        }, 100);
        setTimeout(() => clearInterval(check), 5000);
      }
    })();
  </script>
</body>

</html>
