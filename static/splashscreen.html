<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open GFX Board</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-user-select: none;
      user-select: none;
    }

    :root {
      --bg: #09090b;
      --text-1: #f4f4f5;
      --text-3: #52525b;
      --r-lg: 12px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Figtree', system-ui, -apple-system, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px;
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: var(--r-lg);
      display: block;
      filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.25));
    }

    .app-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .app-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.3px;
    }

    .app-desc {
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <img src="/icon.png" alt="Open GFX Board" class="icon" />
  <div class="app-info">
    <span class="app-name">Open GFX Board</span>
    <span class="app-desc">Developed by Alayshoo</span>
  </div>
</body>
</html>
