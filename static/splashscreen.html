<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open GFX Board</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-user-select: none;
      user-select: none;
    }

    :root {
      --bg: #09090b;
      --surface-1: #111114;
      --border-1: #27272f;
      --text-1: #f4f4f5;
      --text-2: #a1a1aa;
      --text-3: #52525b;
      --accent: #38bdf8;
      --r-lg: 12px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Figtree', system-ui, -apple-system, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px;
    }

    .icon-wrap {
      position: relative;
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: var(--r-lg);
      display: block;
      filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.25));
    }

    .app-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .app-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.3px;
    }

    .app-desc {
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border-1);
    }

    .loading-bar-track {
      width: 160px;
      height: 2px;
      background: var(--border-1);
      border-radius: 1px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 1px;
      animation: load 2s ease-out forwards;
    }

    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 75%; }
      85%  { width: 88%; }
      100% { width: 95%; }
    }
  </style>
</head>
<body>
  <img src="/icon.png" alt="Open GFX Board" class="icon" />
  <div class="app-info">
    <span class="app-name">Open GFX Board</span>
    <span class="app-desc">Developed by Alayshoo</span>
  </div>
  <div class="divider"></div>
  <div class="loading-bar-track">
    <div class="loading-bar-fill"></div>
  </div>
</body>
</html>
